<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>🖌️ 카피페 위젯 생성기 (글자색 추가, 정렬 개선, 예시 업데이트)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #f1f5f9;
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    padding: 2rem 1rem;
    color: #0f172a;
  }
  .container {
    max-width: 1600px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    align-items: start;
  }
  @media (max-width: 1000px) { .container { grid-template-columns: 1fr; } }
  
  /* 좌측 폼 */
  .form-panel {
    background: white;
    border-radius: 2rem;
    box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    padding: 1.2rem;
    border: 1px solid #e2e8f0;
    max-height: 90vh;
    overflow-y: auto;
  }
  .form-group { margin-bottom: 1rem; }
  label { font-weight: 600; font-size: 0.8rem; display: block; margin-bottom: 0.2rem; color: #1e293b; }
  input, textarea, select {
    width: 100%;
    padding: 0.5rem 0.7rem;
    border: 1px solid #cbd5e1;
    border-radius: 1rem;
    font-size: 0.85rem;
    background: #fefcf5;
  }
  /* 컬러 그리드 (콤팩트) */
  .color-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.8rem;
  }
  .color-item {
    background: #f8fafc;
    padding: 0.4rem;
    border-radius: 1rem;
  }
  .color-item label { font-size: 0.7rem; margin-bottom: 0.1rem; }
  .color-item input { padding: 0.2rem; height: 2rem; }
  
  .section-title {
    font-size: 1rem;
    font-weight: 700;
    margin: 1rem 0 0.6rem 0;
    border-left: 3px solid #3b82f6;
    padding-left: 0.7rem;
  }
  button {
    background: #0f172a;
    color: white;
    border: none;
    padding: 0.4rem 1rem;
    border-radius: 2rem;
    font-weight: 500;
    cursor: pointer;
    transition: 0.2s;
    margin-right: 0.5rem;
    margin-top: 0.3rem;
    font-size: 0.8rem;
  }
  button:hover { opacity: 0.85; transform: scale(0.97); }
  .story-item {
    background: #f8fafc;
    border-radius: 1rem;
    padding: 0.8rem;
    margin-bottom: 0.8rem;
    border: 1px solid #e2e8f0;
  }
  .line-item {
    display: flex;
    gap: 0.4rem;
    margin-bottom: 0.5rem;
    align-items: center;
  }
  .line-item input { flex: 1; font-size: 0.8rem; }
  .line-item button {
    width: 28px;
    height: 28px;
    padding: 0;
    background: #dc2626;
    border-radius: 30px;
  }
  
  /* 우측 패널 (미리보기 상단, 코드 하단) */
  .result-panel {
    background: #0f172a;
    border-radius: 2rem;
    padding: 1rem;
    color: #e2e8f0;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  .code-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    margin-top: 0.5rem;
  }
  pre {
    background: #1e293b;
    padding: 0.8rem;
    border-radius: 1rem;
    overflow-x: auto;
    font-size: 0.65rem;
    font-family: monospace;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 38vh;
  }
  .preview-container {
    background: #0b0c0e;
    border-radius: 1.2rem;
    padding: 0.6rem;
    border: 1px solid #334155;
  }
  .preview-label {
    font-size: 0.7rem;
    margin-bottom: 0.4rem;
    color: #94a3b8;
    display: flex;
    justify-content: space-between;
  }
  iframe {
    width: 100%;
    background: #0e0f11;
    border-radius: 0.8rem;
    border: none;
    display: block;
    aspect-ratio: 3/4;
    max-width: 500px;
    margin: 0 auto;
  }
  .copy-btn, .download-btn { background: #3b82f6; border: none; padding: 0.3rem 0.8rem; border-radius: 2rem; font-size: 0.7rem; }
  hr { margin: 0.8rem 0; border-color: #334155; }
  small { font-size: 0.7rem; color: #94a3b8; }
  .character-list {
    background: #f1f5f9;
    border-radius: 1rem;
    padding: 0.6rem;
    margin-top: 0.3rem;
  }
  .char-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.4rem;
  }
  .char-name { width: 100px; font-weight: 600; font-size: 0.75rem; }
  .char-img-url { flex: 1; font-size: 0.75rem; }
  .checkbox-group {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: 0.2rem;
    margin-bottom: 0.5rem;
  }
  .checkbox-group label { margin-bottom: 0; font-size: 0.8rem; }
  .two-columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.8rem;
  }
</style>
</head>
<body>
<div class="container">
  <!-- 좌측: 설정 폼 -->
  <div class="form-panel">
    <h2 style="font-size: 1.3rem;">🧩 카피페 위젯 생성기</h2>
    <p style="margin-bottom:0.8rem; font-size:0.75rem;">값을 입력하면 오른쪽에 미리보기와 HTML 코드가 실시간 갱신됩니다.</p>

    <div class="form-group">
      <label>🏷️ 채팅방 이름</label>
      <input type="text" id="chatRoomName" value="채팅방">
    </div>

    <div class="section-title">🎨 색상 커스텀</div>
    <div class="color-grid">
      <div class="color-item"><label>헤더 배경</label><input type="color" id="headerBg" value="#ffffff"></div>
      <div class="color-item"><label>대화 배경</label><input type="color" id="chatBg" value="#ffffff"></div>
      <div class="color-item"><label>왼쪽 말풍선</label><input type="color" id="bubbleLeftColor" value="#5294ff"></div>
      <div class="color-item"><label>오른쪽 말풍선</label><input type="color" id="bubbleRightColor" value="#7a008a"></div>
      <div class="color-item"><label>왼쪽 글자색</label><input type="color" id="textLeftColor" value="#ffffff"></div>
      <div class="color-item"><label>오른쪽 글자색</label><input type="color" id="textRightColor" value="#ffffff"></div>
      <div class="color-item"><label>이름 색상</label><input type="color" id="nameColor" value="#000000"></div>
      <div class="color-item"><label>버튼 배경</label><input type="color" id="btnBg" value="#ffffff"></div>
      <div class="color-item"><label>채팅방 이름 글자색</label><input type="color" id="chatTitleColor" value="#000000"></div>
      <div class="color-item"><label>카피페 제목 글자색</label><input type="color" id="storyTitleColor" value="#cbd5e6"></div>
    </div>

    <div class="section-title">🖼️ 배경 이미지 (URL)</div>
    <div class="form-group"><label>초기 빈 화면 배경</label><input type="text" id="emptyBgUrl" placeholder="https://..."></div>
    <div class="form-group"><label>대화 표시 중 배경</label><input type="text" id="chatBgUrl" placeholder="https://..."></div>
    <div class="checkbox-group">
      <input type="checkbox" id="hideEmptyMessage">
      <label>✨ 빈 화면 메시지 숨기기 (배경만 보임)</label>
    </div>

    <div class="section-title">👤 프로필 이미지</div>
    <div class="checkbox-group" style="margin-bottom:0.5rem;">
      <input type="checkbox" id="useProfileImages">
      <label>프로필 이미지 사용 (캐릭터별)</label>
    </div>
    <div id="profileImagesPanel" style="display: none;"></div>

    <div class="section-title">📚 카피페 데이터</div>
    <div id="storiesContainer"></div>
    <button id="addStoryBtn" style="background:#2563eb;">➕ 카피페 추가</button>
    <hr>
    <small>※ 두 번째 화자가 오른쪽 말풍선.<br>프로필 이미지 사용 시 각 캐릭터 URL 입력.</small>
  </div>

  <!-- 우측: 미리보기 + 코드 -->
  <div class="result-panel">
    <div class="preview-container">
      <div class="preview-label">
        <span>🖥️ 실시간 미리보기 (3:4)</span>
        <span style="font-size:0.6rem;">버튼/랜덤 동작 확인</span>
      </div>
      <iframe id="previewIframe" title="Preview" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>
    </div>
    <div class="code-header">
      <strong>📋 생성된 HTML 코드 (티스토리용)</strong>
      <div><button id="copyCodeBtn" class="copy-btn">📋 복사</button><button id="downloadHtmlBtn" class="download-btn">⬇️ 저장</button></div>
    </div>
    <pre id="generatedCode"></pre>
    <small>💡 코드를 복사하여 티스토리 HTML 모드에 붙여넣으세요.</small>
  </div>
</div>

<script>
  // ========== 새로운 예시 카피페 (사용자가 보낸 chat_widget.html 기준) ==========
  let storiesData = [
    { 
      title: "예시1", 
      lines: [
        { name: "뫄뫄", text: "이것저것 써 봅시다." },
        { name: "솨솨", text: "두 번째 대사 캐릭터가 발신인 고정!" },
        { name: "뫄뫄", text: "긴 텍스트도 문제 없습니다. 엄청나게 길다면 그때는 또 모르겠지만⋯ 자컾 카피페 백업용으로 만들기 시작했고 이후에도 ‘캐릭터들끼리 채팅 하는 거 보고싶다’는 생각 정도만 있기에 엄청나게 긴 글을 작성하셨을 때 에러가 발생한다면 저도 잘 모릅니다⋯." },
        { name: "솨솨", text: "제작자는 코딩 문외한에 가까우며, 디자인만 직접 하고 코딩은 99%를 ai의 도움을 받았습니다. 혹시 오류가 발생한다면⋯ 일단 문의는 주세요. 다시 ai를 개 패보겠습니다." }
      ]
    },
    { 
      title: "예시2", 
      lines: [
        { name: "뫄뫄", text: "여러 명도 채팅 가능합니다!" },
        { name: "뫄뫄", text: "다인관을 좋아하다 보니 포기할 수 없는 기능이었습니다." },
        { name: "봐봐", text: "다만 인원이 엄청나게 많아지면 프로필 사진 설정 시 설정탭 스크롤이 길어질 듯합니다. 근데 이건 카피페 분량이 많아도 마찬가지라⋯." },
        { name: "와와", text: "이모티콘 출력 테스트😍😍" }
      ]
    }
  ];

  let characterImages = {};

  const storiesContainer = document.getElementById('storiesContainer');
  const useProfileCheckbox = document.getElementById('useProfileImages');
  const profilePanel = document.getElementById('profileImagesPanel');
  const hideEmptyMsgCheckbox = document.getElementById('hideEmptyMessage');

  function escapeHtml(str) {
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
  }

  function getUniqueCharacters() {
    const names = new Set();
    storiesData.forEach(story => {
      story.lines.forEach(line => { if (line.name) names.add(line.name); });
    });
    return Array.from(names).sort();
  }

  function updateProfilePanel() {
    const useImages = useProfileCheckbox.checked;
    profilePanel.style.display = useImages ? 'block' : 'none';
    if (!useImages) return;
    const chars = getUniqueCharacters();
    if (chars.length === 0) {
      profilePanel.innerHTML = '<div class="character-list">⚠️ 캐릭터가 없습니다. 카피페를 추가해주세요.</div>';
      return;
    }
    let html = '<div class="character-list">';
    chars.forEach(char => {
      const currentUrl = characterImages[char] || '';
      html += `
        <div class="char-item">
          <div class="char-name">${escapeHtml(char)}</div>
          <input type="text" class="char-img-url" data-char="${escapeHtml(char)}" value="${escapeHtml(currentUrl)}" placeholder="이미지 URL" style="flex:1; font-size:0.75rem;">
        </div>
      `;
    });
    html += '</div>';
    profilePanel.innerHTML = html;
    document.querySelectorAll('.char-img-url').forEach(input => {
      input.addEventListener('input', (e) => {
        const char = input.dataset.char;
        characterImages[char] = input.value;
        updateAll();
      });
    });
  }

  function renderStoriesForm() {
    storiesContainer.innerHTML = '';
    storiesData.forEach((story, idx) => {
      const storyDiv = document.createElement('div');
      storyDiv.className = 'story-item';
      storyDiv.dataset.index = idx;
      storyDiv.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <strong>📖 카피페 ${idx+1}</strong>
          <button class="removeStoryBtn" data-idx="${idx}" style="background:#b91c1c; padding:0.2rem 0.6rem;">삭제</button>
        </div>
        <div class="form-group" style="margin-top:0.3rem;">
          <label>제목</label>
          <input type="text" class="story-title" value="${escapeHtml(story.title)}">
        </div>
        <div class="lines-container" data-story="${idx}">
          ${story.lines.map((line, lineIdx) => `
            <div class="line-item" data-lineidx="${lineIdx}">
              <input type="text" placeholder="이름" class="line-name" value="${escapeHtml(line.name)}" style="width:30%;">
              <input type="text" placeholder="대사 내용" class="line-text" value="${escapeHtml(line.text)}" style="width:65%;">
              <button class="removeLineBtn" data-story="${idx}" data-line="${lineIdx}">✖</button>
            </div>
          `).join('')}
        </div>
        <button class="addLineBtn" data-story="${idx}" style="background:#334155; margin-top:0.2rem;">+ 대사 추가</button>
      `;
      storiesContainer.appendChild(storyDiv);
    });
    attachStoryEvents();
  }

  function attachStoryEvents() {
    document.querySelectorAll('.removeStoryBtn').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.idx);
        storiesData.splice(idx, 1);
        renderStoriesForm();
        updateProfilePanel();
        updateAll();
      });
    });
    document.querySelectorAll('.addLineBtn').forEach(btn => {
      btn.addEventListener('click', () => {
        const storyIdx = parseInt(btn.dataset.story);
        storiesData[storyIdx].lines.push({ name: "New", text: "새 대사" });
        renderStoriesForm();
        updateProfilePanel();
        updateAll();
      });
    });
    document.querySelectorAll('.removeLineBtn').forEach(btn => {
      btn.addEventListener('click', () => {
        const storyIdx = parseInt(btn.dataset.story);
        const lineIdx = parseInt(btn.dataset.line);
        storiesData[storyIdx].lines.splice(lineIdx, 1);
        renderStoriesForm();
        updateProfilePanel();
        updateAll();
      });
    });
    storiesContainer.querySelectorAll('.story-title').forEach((input, idx) => {
      input.addEventListener('input', (e) => { storiesData[idx].title = e.target.value; updateAll(); });
    });
    storiesContainer.querySelectorAll('.line-name').forEach((input) => {
      const storyDiv = input.closest('.story-item');
      const lineItem = input.closest('.line-item');
      if (!storyDiv || !lineItem) return;
      const storyIdx = parseInt(storyDiv.dataset.index);
      const lineIdx = parseInt(lineItem.dataset.lineidx);
      input.addEventListener('input', (e) => {
        if (storiesData[storyIdx]?.lines[lineIdx]) {
          storiesData[storyIdx].lines[lineIdx].name = e.target.value;
        }
        updateProfilePanel();
        updateAll();
      });
    });
    storiesContainer.querySelectorAll('.line-text').forEach((input) => {
      const storyDiv = input.closest('.story-item');
      const lineItem = input.closest('.line-item');
      if (!storyDiv || !lineItem) return;
      const storyIdx = parseInt(storyDiv.dataset.index);
      const lineIdx = parseInt(lineItem.dataset.lineidx);
      input.addEventListener('input', (e) => {
        if (storiesData[storyIdx]?.lines[lineIdx]) storiesData[storyIdx].lines[lineIdx].text = e.target.value;
        updateAll();
      });
    });
  }

  document.getElementById('addStoryBtn').addEventListener('click', () => {
    storiesData.push({ title: "새 이야기", lines: [{ name: "캐릭터", text: "대사를 입력하세요" }] });
    renderStoriesForm();
    updateProfilePanel();
    updateAll();
  });
  useProfileCheckbox.addEventListener('change', () => { updateProfilePanel(); updateAll(); });
  hideEmptyMsgCheckbox.addEventListener('change', () => updateAll());

  // ---------- HTML 생성 (글자색 포함) ----------
  function generateWidgetHTML() {
    const chatRoomName = document.getElementById('chatRoomName').value;
    const headerBg = document.getElementById('headerBg').value;
    const chatBg = document.getElementById('chatBg').value;
    const bubbleLeftColor = document.getElementById('bubbleLeftColor').value;
    const bubbleRightColor = document.getElementById('bubbleRightColor').value;
    const textLeftColor = document.getElementById('textLeftColor').value;
    const textRightColor = document.getElementById('textRightColor').value;
    const nameColor = document.getElementById('nameColor').value;
    const btnBg = document.getElementById('btnBg').value;
    const chatTitleColor = document.getElementById('chatTitleColor').value;
    const storyTitleColor = document.getElementById('storyTitleColor').value;
    const emptyBgUrl = document.getElementById('emptyBgUrl').value;
    const chatBgUrl = document.getElementById('chatBgUrl').value;
    const useProfile = useProfileCheckbox.checked;
    const hideMessage = hideEmptyMsgCheckbox.checked;
    const charImages = useProfile ? characterImages : {};
    const storiesJson = JSON.stringify(storiesData);
    const charImagesJson = JSON.stringify(charImages);
    
    const showEmptyFuncBody = hideMessage ? 
      `function showEmpty(){ container.innerHTML=''; setBg('empty'); indexSpan.innerText='⚡ 대기 ('+TOTAL+'개)'; currentIdx=null; }` :
      `function showEmpty(){ container.innerHTML='<div class="empty-chat-custom">💬 대화를 불러오세요<br><span style="font-size:0.7rem;">◀ ▶ | 🎲 random</span></div>'; setBg('empty'); indexSpan.innerText='⚡ 대기 ('+TOTAL+'개)'; currentIdx=null; }`;
    
    return `<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  .chat-viewer-widget { all: initial; display: block; max-width: 720px; margin: 0 auto; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; line-height: 1.45; }
  .chat-viewer-widget * { box-sizing: border-box; margin: 0; padding: 0; }
  .chat-messenger-app { background: #0e0f11; border-radius: 32px; box-shadow: 0 20px 35px -10px rgba(0,0,0,0.5); overflow: hidden; }
  .chat-header-custom { background: ${headerBg}; padding: 1rem 1.3rem; border-bottom: 1px solid #2a2c30; display: flex; align-items: baseline; justify-content: flex-start; }
  .chat-title-custom { font-weight: 700; font-size: 1.3rem; color: ${chatTitleColor}; background: none; -webkit-background-clip: unset; }
  .chat-messages-custom { aspect-ratio: 3/4; width: 100%; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.9rem; background-size: cover; background-position: center; background-repeat: no-repeat; background-color: ${chatBg}; }
  .story-title-message { text-align: center; margin-bottom: 0.8rem; padding: 0.5rem 1rem; background: rgba(0,0,0,0.7); border-radius: 30px; font-size: 0.9rem; font-weight: 600; color: ${storyTitleColor}; align-self: center; border: 1px solid rgba(255,255,255,0.2); width: fit-content; backdrop-filter: blur(4px); }
  .message-row { display: flex; align-items: flex-start; gap: 0.6rem; max-width: 100%; }
  .message-row-left { justify-content: flex-start; }
  .message-row-right { justify-content: flex-end; }
  .avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; background: #334155; flex-shrink: 0; margin-top: 0.2rem; }
  .message-bubble-custom { display: flex; flex-direction: column; max-width: 75%; animation: fadeSlide 0.25s ease-out; }
  .message-left .message-bubble-custom { align-items: flex-start; }
  .message-right .message-bubble-custom { align-items: flex-end; }
  .message-name-custom { font-size: 0.75rem; font-weight: 600; color: ${nameColor}; margin-bottom: 0.2rem; margin-left: 0.4rem; margin-right: 0.4rem; }
  .message-right .message-name-custom { text-align: right; }
  .bubble-text-custom { padding: 0.6rem 1rem; border-radius: 20px; font-size: 0.95rem; line-height: 1.4; word-break: break-word; box-shadow: 0 1px 0.5px rgba(0,0,0,0.2); }
  .bubble-left { background: ${bubbleLeftColor}; color: ${textLeftColor}; border-top-left-radius: 4px; }
  .bubble-right { background: ${bubbleRightColor}; color: ${textRightColor}; border-top-right-radius: 4px; }
  @keyframes fadeSlide { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .empty-chat-custom { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; color: #e2e8f0; gap: 0.7rem; background: rgba(0,0,0,0.4); border-radius: 24px; padding: 1.5rem; }
  .nav-bar-custom { background: #181a1e; padding: 0.7rem 1.2rem; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid #26292e; flex-wrap: wrap; }
  .icon-btn-custom { background: ${btnBg}; border: none; width: 44px; height: 44px; border-radius: 32px; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; color: #cfd9e6; font-size: 1.35rem; margin-right: 0.5rem; transition:0.2s; }
  .icon-btn-custom:hover { background: #3a4050; }
  .index-badge-custom { background: #0f1115; padding: 0.3rem 0.9rem; border-radius: 40px; font-size: 0.75rem; color: #b9c2d4; }
  .chat-messages-custom::-webkit-scrollbar { width: 4px; }
</style>
<body>
<div class="chat-viewer-widget">
  <div class="chat-messenger-app">
    <div class="chat-header-custom"><span class="chat-title-custom">${escapeHtml(chatRoomName)}</span></div>
    <div id="widgetChatArea" class="chat-messages-custom" style="${emptyBgUrl ? `background-image: url('${emptyBgUrl}');` : ''}"></div>
    <div class="nav-bar-custom">
      <div><button class="icon-btn-custom" id="prevBtn">◀</button><button class="icon-btn-custom" id="nextBtn">▶</button></div>
      <div><button class="icon-btn-custom" id="randomBtn">🎲</button><button class="icon-btn-custom" id="resetBtn">⟳</button></div>
      <div class="index-badge-custom" id="indexBadge">대기중</div>
    </div>
  </div>
</div>
<script>
  (function(){
    const stories = ${storiesJson};
    const TOTAL = stories.length;
    let currentIdx = null, activeToken = 0, pending = [];
    const emptyBg = "${emptyBgUrl.replace(/\\/g, '\\\\')}", chatBg = "${chatBgUrl.replace(/\\/g, '\\\\')}";
    const useProfile = ${useProfile};
    const charImages = ${charImagesJson};
    const container = document.getElementById('widgetChatArea');
    const indexSpan = document.getElementById('indexBadge');
    function clearTimeouts(){ for(let t of pending) clearTimeout(t); pending=[]; }
    function setBg(state){ let url = state==='empty' ? emptyBg : chatBg; if(url && url.trim()) container.style.backgroundImage = "url('"+url+"')"; else container.style.backgroundImage="none"; container.style.backgroundColor="${chatBg}"; }
    ${showEmptyFuncBody}
    function escapeHtml(s){ return s.replace(/[&<>]/g, m=> m==='&'?'&amp;':(m==='<'?'&lt;':'&gt;')); }
    function addMsg(name, text, isRight){
      const row = document.createElement('div');
      row.className = "message-row " + (isRight ? "message-row-right" : "message-row-left");
      const bubbleDiv = document.createElement('div');
      bubbleDiv.className = "message-bubble-custom " + (isRight ? "message-right" : "message-left");
      bubbleDiv.innerHTML = '<div class="message-name-custom">'+escapeHtml(name)+'</div><div class="bubble-text-custom '+(isRight?"bubble-right":"bubble-left")+'">'+escapeHtml(text)+'</div>';
      if(useProfile && charImages[name] && charImages[name].trim() !== ""){
        const avatar = document.createElement('img');
        avatar.src = charImages[name];
        avatar.className = "avatar";
        avatar.onerror = () => { avatar.style.display = 'none'; };
        if(isRight){
          row.appendChild(bubbleDiv);
          row.appendChild(avatar);
        } else {
          row.appendChild(avatar);
          row.appendChild(bubbleDiv);
        }
      } else {
        row.appendChild(bubbleDiv);
      }
      container.appendChild(row);
    }
    function addTitle(title){
      let tdiv = document.createElement('div');
      tdiv.className = 'story-title-message';
      tdiv.innerText = title;
      if(container.firstChild) container.insertBefore(tdiv, container.firstChild);
      else container.appendChild(tdiv);
    }
    function streamStory(story, token, secondSpeaker){
      for(let i=0;i<story.lines.length;i++){
        let tid = setTimeout(()=>{
          if(token !== activeToken) return;
          let line = story.lines[i];
          addMsg(line.name, line.text, line.name === secondSpeaker);
        }, i*750);
        pending.push(tid);
      }
    }
    function loadStory(idx){
      if(idx<1||idx>TOTAL) return;
      clearTimeouts(); activeToken++; let tok = activeToken;
      let story = stories[idx-1];
      let second = story.lines.length>=2 ? story.lines[1].name : null;
      container.innerHTML='';
      setBg('chat');
      addTitle(story.title);
      streamStory(story, tok, second);
      currentIdx = idx;
      indexSpan.innerText = '📖 '+currentIdx+' / '+TOTAL;
      container.scrollTop = 0;
    }
    function reset(){ clearTimeouts(); activeToken++; showEmpty(); }
    function next(){ if(currentIdx===null) loadStory(1); else { let nxt = currentIdx+1; if(nxt>TOTAL) nxt=1; loadStory(nxt); } }
    function prev(){ if(currentIdx===null) return; let prv = currentIdx-1; if(prv<1) prv=TOTAL; loadStory(prv); }
    function randStory(){ loadStory(Math.floor(Math.random()*TOTAL)+1); }
    document.getElementById('prevBtn').onclick=prev;
    document.getElementById('nextBtn').onclick=next;
    document.getElementById('randomBtn').onclick=randStory;
    document.getElementById('resetBtn').onclick=reset;
    reset();
  })();
<\/script>
</body>
</html>`;
  }

  function updateGeneratedCode() {
    const code = generateWidgetHTML();
    document.getElementById('generatedCode').innerText = code;
    const iframe = document.getElementById('previewIframe');
    const blob = new Blob([code], {type: 'text/html'});
    const url = URL.createObjectURL(blob);
    iframe.src = url;
    iframe.onload = () => URL.revokeObjectURL(url);
  }

  document.getElementById('copyCodeBtn').onclick = () => {
    navigator.clipboard.writeText(generateWidgetHTML()).then(() => alert('✅ 코드 복사됨'));
  };
  document.getElementById('downloadHtmlBtn').onclick = () => {
    const blob = new Blob([generateWidgetHTML()], {type: 'text/html'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'chat_widget.html';
    a.click();
    URL.revokeObjectURL(a.href);
  };

  function updateAll() {
    updateGeneratedCode();
  }
  const inputs = ['chatRoomName', 'headerBg', 'chatBg', 'bubbleLeftColor', 'bubbleRightColor', 'textLeftColor', 'textRightColor', 'nameColor', 'btnBg', 'chatTitleColor', 'storyTitleColor', 'emptyBgUrl', 'chatBgUrl'];
  inputs.forEach(id => document.getElementById(id).addEventListener('input', updateAll));
  renderStoriesForm();
  updateProfilePanel();
  updateAll();
</script>
</body>
</html>
