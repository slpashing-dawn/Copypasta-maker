<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>🖌️ 카피페 위젯 생성기 + 미리보기 (글씨색 포함)</title>
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  body {
    background: #f1f5f9;
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    padding: 2rem 1rem;
    color: #0f172a;
  }
  .container {
    max-width: 1600px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    align-items: start;
  }
  @media (max-width: 1000px) {
    .container { grid-template-columns: 1fr; }
  }
  .form-panel {
    background: white;
    border-radius: 2rem;
    box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    padding: 1.6rem;
    border: 1px solid #e2e8f0;
    max-height: 90vh;
    overflow-y: auto;
  }
  .form-group {
    margin-bottom: 1.4rem;
  }
  label {
    font-weight: 600;
    font-size: 0.85rem;
    display: block;
    margin-bottom: 0.4rem;
    color: #1e293b;
  }
  input, textarea, select {
    width: 100%;
    padding: 0.6rem 0.8rem;
    border: 1px solid #cbd5e1;
    border-radius: 1rem;
    font-size: 0.9rem;
    font-family: monospace;
    background: #fefcf5;
  }
  .color-row {
    display: flex;
    gap: 1rem;
    align-items: center;
  }
  .section-title {
    font-size: 1.1rem;
    font-weight: 700;
    margin: 1.2rem 0 0.8rem 0;
    border-left: 4px solid #3b82f6;
    padding-left: 0.7rem;
  }
  button {
    background: #0f172a;
    color: white;
    border: none;
    padding: 0.6rem 1.2rem;
    border-radius: 2rem;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
    margin-right: 0.6rem;
    margin-top: 0.5rem;
  }
  button:hover { opacity: 0.85; transform: scale(0.97); }
  .story-item {
    background: #f8fafc;
    border-radius: 1.2rem;
    padding: 1rem;
    margin-bottom: 1rem;
    border: 1px solid #e2e8f0;
  }
  .line-item {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 0.6rem;
    align-items: center;
  }
  .line-item input { flex: 1; }
  .line-item button {
    width: 32px;
    height: 32px;
    padding: 0;
    background: #dc2626;
    border-radius: 30px;
  }
  .result-panel {
    background: #0f172a;
    border-radius: 2rem;
    padding: 1.2rem;
    color: #e2e8f0;
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
  }
  .code-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
  }
  pre {
    background: #1e293b;
    padding: 1rem;
    border-radius: 1.2rem;
    overflow-x: auto;
    font-size: 0.7rem;
    font-family: 'Courier New', monospace;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 40vh;
  }
  .preview-container {
    background: #0b0c0e;
    border-radius: 1.5rem;
    padding: 0.8rem;
    border: 1px solid #334155;
  }
  .preview-label {
    font-size: 0.75rem;
    margin-bottom: 0.5rem;
    color: #94a3b8;
    display: flex;
    justify-content: space-between;
  }
  iframe {
    width: 100%;
    background: #0e0f11;
    border-radius: 1rem;
    border: none;
    display: block;
  }
  .copy-btn, .download-btn {
    background: #3b82f6;
    border: none;
    padding: 0.4rem 1rem;
    border-radius: 2rem;
    font-weight: 500;
  }
  hr { margin: 1rem 0; border-color: #334155; }
  small { color: #94a3b8; }
</style>
</head>
<body>
<div class="container">
  <div class="form-panel">
    <h2>🧩 카피페 위젯 생성기 + 미리보기</h2>
    <p style="margin-bottom:1rem; font-size:0.85rem;">값을 입력하면 오른쪽에 미리보기와 HTML 코드가 실시간 갱신됩니다.</p>

    <div class="form-group">
      <label>🏷️ 채팅방 이름 (상단 헤더)</label>
      <input type="text" id="chatRoomName" value="💬 bat·texts">
    </div>

    <div class="section-title">🎨 색상 커스텀</div>
    <div class="form-group">
      <label>헤더 배경색</label>
      <input type="color" id="headerBg" value="#181a1e">
    </div>
    <div class="form-group">
      <label>대화 배경색 (fallback)</label>
      <input type="color" id="chatBg" value="#0b0c0e">
    </div>
    <div class="form-group">
      <label>받는 사람 말풍선 배경 (왼쪽)</label>
      <input type="color" id="bubbleLeftColor" value="#202328">
    </div>
    <div class="form-group">
      <label>보내는 사람 말풍선 배경 (오른쪽)</label>
      <input type="color" id="bubbleRightColor" value="#2c6e5c">
    </div>
    <div class="form-group">
      <label>받는 사람 글자색 (왼쪽)</label>
      <input type="color" id="textLeftColor" value="#f0f3fa">
    </div>
    <div class="form-group">
      <label>보내는 사람 글자색 (오른쪽)</label>
      <input type="color" id="textRightColor" value="#ffffff">
    </div>
    <div class="form-group">
      <label>이름 색상</label>
      <input type="color" id="nameColor" value="#e2e8f0">
    </div>
    <div class="form-group">
      <label>버튼 배경색</label>
      <input type="color" id="btnBg" value="#262a30">
    </div>

    <div class="section-title">🖼️ 배경 이미지 (URL)</div>
    <div class="form-group">
      <label>초기 빈 화면 배경 URL</label>
      <input type="text" id="emptyBgUrl" placeholder="https://example.com/empty.jpg">
    </div>
    <div class="form-group">
      <label>대화 표시 중 배경 URL</label>
      <input type="text" id="chatBgUrl" placeholder="https://example.com/chat-bg.jpg">
    </div>

    <div class="section-title">📚 카피페 데이터</div>
    <div id="storiesContainer"></div>
    <button id="addStoryBtn" style="background:#2563eb;">➕ 카피페 추가</button>
    <hr>
    <small>※ 두 번째 화자가 자동으로 오른쪽 말풍선(보낸 사람)이 됩니다.</small>
  </div>

  <div class="result-panel">
    <div class="code-header">
      <strong>📋 생성된 HTML 코드</strong>
      <div>
        <button id="copyCodeBtn" class="copy-btn">📋 복사</button>
        <button id="downloadHtmlBtn" class="download-btn">⬇️ HTML 파일로 저장</button>
      </div>
    </div>
    <pre id="generatedCode"></pre>
    <div class="preview-container">
      <div class="preview-label">
        <span>🖥️ 실시간 미리보기 (3:4 비율)</span>
        <span style="font-size:0.65rem;">버튼/랜덤 동작 확인 가능</span>
      </div>
      <iframe id="previewIframe" title="Preview" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals" style="aspect-ratio: 3/4; width: 100%;"></iframe>
    </div>
  </div>
</div>

<script>
  // 초기 데이터
  let storiesData = [
    { title: "Morning Chaos", lines: [ { name: "Dick", text: "(yawning) Mornin', babe." }, { name: "Aiden", text: "(making coffee) You drooled on my shoulder again." }, { name: "Dick", text: "That's called marking my territory." }, { name: "Aiden", text: "(deadpan) Your territory is sticky and gross." } ] },
    { title: "Secret Cats", lines: [ { name: "Jason", text: "(looking suspicious) Why's there a cat in the cave?" }, { name: "Aiden", text: "(holding a tiny black kitten) This is Batman Jr." }, { name: "Dick", text: "(snorting) Bruce is gonna murder you." }, { name: "Aiden", text: "(shrugs) Worth it." } ] }
  ];

  const storiesContainer = document.getElementById('storiesContainer');
  function escapeHtml(str) {
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
  }

  function renderStoriesForm() {
    storiesContainer.innerHTML = '';
    storiesData.forEach((story, idx) => {
      const storyDiv = document.createElement('div');
      storyDiv.className = 'story-item';
      storyDiv.dataset.index = idx;
      storyDiv.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <strong>📖 카피페 ${idx+1}</strong>
          <button class="removeStoryBtn" data-idx="${idx}" style="background:#b91c1c; padding:0.2rem 0.8rem;">삭제</button>
        </div>
        <div class="form-group" style="margin-top:0.5rem;">
          <label>제목</label>
          <input type="text" class="story-title" value="${escapeHtml(story.title)}">
        </div>
        <div class="lines-container" data-story="${idx}">
          ${story.lines.map((line, lineIdx) => `
            <div class="line-item" data-lineidx="${lineIdx}">
              <input type="text" placeholder="이름" class="line-name" value="${escapeHtml(line.name)}" style="width:30%;">
              <input type="text" placeholder="대사 내용" class="line-text" value="${escapeHtml(line.text)}" style="width:65%;">
              <button class="removeLineBtn" data-story="${idx}" data-line="${lineIdx}">✖</button>
            </div>
          `).join('')}
        </div>
        <button class="addLineBtn" data-story="${idx}" style="background:#334155; margin-top:0.3rem;">+ 대사 추가</button>
      `;
      storiesContainer.appendChild(storyDiv);
    });
    attachStoryEvents();
  }

  function attachStoryEvents() {
    document.querySelectorAll('.removeStoryBtn').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.idx);
        storiesData.splice(idx, 1);
        renderStoriesForm();
        updateAll();
      });
    });
    document.querySelectorAll('.addLineBtn').forEach(btn => {
      btn.addEventListener('click', () => {
        const storyIdx = parseInt(btn.dataset.story);
        storiesData[storyIdx].lines.push({ name: "New", text: "새 대사" });
        renderStoriesForm();
        updateAll();
      });
    });
    document.querySelectorAll('.removeLineBtn').forEach(btn => {
      btn.addEventListener('click', () => {
        const storyIdx = parseInt(btn.dataset.story);
        const lineIdx = parseInt(btn.dataset.line);
        storiesData[storyIdx].lines.splice(lineIdx, 1);
        renderStoriesForm();
        updateAll();
      });
    });
    storiesContainer.querySelectorAll('.story-title').forEach((input, idx) => {
      input.addEventListener('input', (e) => { storiesData[idx].title = e.target.value; updateAll(); });
    });
    storiesContainer.querySelectorAll('.line-name').forEach((input, idx) => {
      const storyDiv = input.closest('.story-item');
      const lineItem = input.closest('.line-item');
      if (!storyDiv || !lineItem) return;
      const storyIdx = parseInt(storyDiv.dataset.index);
      const lineIdx = parseInt(lineItem.dataset.lineidx);
      input.addEventListener('input', (e) => {
        if (storiesData[storyIdx]?.lines[lineIdx]) storiesData[storyIdx].lines[lineIdx].name = e.target.value;
        updateAll();
      });
    });
    storiesContainer.querySelectorAll('.line-text').forEach((input, idx) => {
      const storyDiv = input.closest('.story-item');
      const lineItem = input.closest('.line-item');
      if (!storyDiv || !lineItem) return;
      const storyIdx = parseInt(storyDiv.dataset.index);
      const lineIdx = parseInt(lineItem.dataset.lineidx);
      input.addEventListener('input', (e) => {
        if (storiesData[storyIdx]?.lines[lineIdx]) storiesData[storyIdx].lines[lineIdx].text = e.target.value;
        updateAll();
      });
    });
  }

  document.getElementById('addStoryBtn').addEventListener('click', () => {
    storiesData.push({ title: "새 이야기", lines: [{ name: "캐릭터", text: "대사를 입력하세요" }] });
    renderStoriesForm();
    updateAll();
  });

  // HTML 생성
  function generateWidgetHTML() {
    const chatRoomName = document.getElementById('chatRoomName').value;
    const headerBg = document.getElementById('headerBg').value;
    const chatBg = document.getElementById('chatBg').value;
    const bubbleLeftColor = document.getElementById('bubbleLeftColor').value;
    const bubbleRightColor = document.getElementById('bubbleRightColor').value;
    const textLeftColor = document.getElementById('textLeftColor').value;
    const textRightColor = document.getElementById('textRightColor').value;
    const nameColor = document.getElementById('nameColor').value;
    const btnBg = document.getElementById('btnBg').value;
    const emptyBgUrl = document.getElementById('emptyBgUrl').value;
    const chatBgUrl = document.getElementById('chatBgUrl').value;
    const storiesJson = JSON.stringify(storiesData);
    
    return `<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  .chat-viewer-widget { all: initial; display: block; max-width: 720px; margin: 0 auto; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; line-height: 1.45; }
  .chat-viewer-widget * { box-sizing: border-box; margin: 0; padding: 0; }
  .chat-messenger-app { background: #0e0f11; border-radius: 32px; box-shadow: 0 20px 35px -10px rgba(0,0,0,0.5); overflow: hidden; }
  .chat-header-custom { background: ${headerBg}; padding: 1rem 1.3rem; border-bottom: 1px solid #2a2c30; display: flex; align-items: baseline; justify-content: flex-start; }
  .chat-title-custom { font-weight: 700; font-size: 1.3rem; background: linear-gradient(135deg, #e1e9f0, #b9c7d9); background-clip: text; -webkit-background-clip: text; color: transparent; }
  .chat-messages-custom { aspect-ratio: 3/4; width: 100%; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.9rem; background-size: cover; background-position: center; background-repeat: no-repeat; background-color: ${chatBg}; }
  .story-title-message { text-align: center; margin-bottom: 0.8rem; padding: 0.5rem 1rem; background: rgba(0,0,0,0.7); border-radius: 30px; font-size: 0.9rem; font-weight: 600; color: #cbd5e6; align-self: center; border: 1px solid rgba(255,255,255,0.2); width: fit-content; backdrop-filter: blur(4px); }
  .message-bubble-custom { display: flex; flex-direction: column; max-width: 85%; animation: fadeSlide 0.25s ease-out; }
  .message-left { align-items: flex-start; }
  .message-right { align-items: flex-end; margin-left: auto; }
  .message-name-custom { font-size: 0.8rem; font-weight: 600; color: ${nameColor}; margin-bottom: 0.25rem; margin-left: 0.6rem; margin-right: 0.6rem; text-shadow: 0 1px 1px rgba(0,0,0,0.3); }
  .message-right .message-name-custom { text-align: right; margin-right: 0.6rem; margin-left: 0; }
  .bubble-text-custom { padding: 0.75rem 1.1rem; border-radius: 24px; font-size: 1rem; line-height: 1.45; word-break: break-word; box-shadow: 0 1px 0.5px rgba(0,0,0,0.2); }
  .bubble-left { background: ${bubbleLeftColor}; color: ${textLeftColor}; border-top-left-radius: 6px; }
  .bubble-right { background: ${bubbleRightColor}; color: ${textRightColor}; border-top-right-radius: 6px; }
  @keyframes fadeSlide { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .empty-chat-custom { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; color: #e2e8f0; gap: 0.7rem; background: rgba(0,0,0,0.4); border-radius: 24px; padding: 1.5rem; }
  .nav-bar-custom { background: #181a1e; padding: 0.7rem 1.2rem; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid #26292e; flex-wrap: wrap; }
  .icon-btn-custom { background: ${btnBg}; border: none; width: 44px; height: 44px; border-radius: 32px; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; color: #cfd9e6; font-size: 1.35rem; margin-right: 0.5rem; transition:0.2s; }
  .icon-btn-custom:hover { background: #3a4050; }
  .index-badge-custom { background: #0f1115; padding: 0.3rem 0.9rem; border-radius: 40px; font-size: 0.75rem; color: #b9c2d4; }
  .chat-messages-custom::-webkit-scrollbar { width: 4px; }
</style>
<body>
<div class="chat-viewer-widget">
  <div class="chat-messenger-app">
    <div class="chat-header-custom"><span class="chat-title-custom">${escapeHtml(chatRoomName)}</span></div>
    <div id="widgetChatArea" class="chat-messages-custom" style="${emptyBgUrl ? `background-image: url('${emptyBgUrl}');` : ''}"></div>
    <div class="nav-bar-custom">
      <div><button class="icon-btn-custom" id="prevBtn">◀</button><button class="icon-btn-custom" id="nextBtn">▶</button></div>
      <div><button class="icon-btn-custom" id="randomBtn">🎲</button><button class="icon-btn-custom" id="resetBtn">⟳</button></div>
      <div class="index-badge-custom" id="indexBadge">대기중</div>
    </div>
  </div>
</div>
<script>
  (function(){
    const stories = ${storiesJson};
    const TOTAL = stories.length;
    let currentIdx = null, activeToken = 0, pending = [];
    const emptyBg = "${emptyBgUrl.replace(/\\/g, '\\\\')}", chatBg = "${chatBgUrl.replace(/\\/g, '\\\\')}";
    const container = document.getElementById('widgetChatArea');
    const indexSpan = document.getElementById('indexBadge');
    function clearTimeouts(){ for(let t of pending) clearTimeout(t); pending=[]; }
    function setBg(state){ let url = state==='empty' ? emptyBg : chatBg; if(url && url.trim()) container.style.backgroundImage = "url('"+url+"')"; else container.style.backgroundImage="none"; container.style.backgroundColor="${chatBg}"; }
    function showEmpty(){ container.innerHTML='<div class="empty-chat-custom">💬 대화를 불러오세요<br><span style="font-size:0.7rem;">◀ ▶ | 🎲 random</span></div>'; setBg('empty'); indexSpan.innerText='⚡ 대기 ('+TOTAL+'개)'; currentIdx=null; }
    function escapeHtml(s){ return s.replace(/[&<>]/g, m=> m==='&'?'&amp;':(m==='<'?'&lt;':'&gt;')); }
    function addMsg(name, text, isRight){
      let div = document.createElement('div');
      div.className = "message-bubble-custom "+(isRight?"message-right":"message-left");
      div.innerHTML = '<div class="message-name-custom">'+escapeHtml(name)+'</div><div class="bubble-text-custom '+(isRight?"bubble-right":"bubble-left")+'">'+escapeHtml(text)+'</div>';
      container.appendChild(div);
    }
    function addTitle(title){
      let tdiv = document.createElement('div');
      tdiv.className = 'story-title-message';
      tdiv.innerText = title;
      if(container.firstChild) container.insertBefore(tdiv, container.firstChild);
      else container.appendChild(tdiv);
    }
    function streamStory(story, token, secondSpeaker){
      for(let i=0;i<story.lines.length;i++){
        let tid = setTimeout(()=>{
          if(token !== activeToken) return;
          let line = story.lines[i];
          addMsg(line.name, line.text, line.name === secondSpeaker);
        }, i*750);
        pending.push(tid);
      }
    }
    function loadStory(idx){
      if(idx<1||idx>TOTAL) return;
      clearTimeouts(); activeToken++; let tok = activeToken;
      let story = stories[idx-1];
      let second = story.lines.length>=2 ? story.lines[1].name : null;
      container.innerHTML='';
      setBg('chat');
      addTitle(story.title);
      streamStory(story, tok, second);
      currentIdx = idx;
      indexSpan.innerText = '📖 '+currentIdx+' / '+TOTAL;
      container.scrollTop = 0;
    }
    function reset(){ clearTimeouts(); activeToken++; showEmpty(); }
    function next(){ if(currentIdx===null) loadStory(1); else { let nxt = currentIdx+1; if(nxt>TOTAL) nxt=1; loadStory(nxt); } }
    function prev(){ if(currentIdx===null) return; let prv = currentIdx-1; if(prv<1) prv=TOTAL; loadStory(prv); }
    function randStory(){ loadStory(Math.floor(Math.random()*TOTAL)+1); }
    document.getElementById('prevBtn').onclick=prev;
    document.getElementById('nextBtn').onclick=next;
    document.getElementById('randomBtn').onclick=randStory;
    document.getElementById('resetBtn').onclick=reset;
    reset();
  })();
<\/script>
</body>
</html>`;
  }

  function updateGeneratedCode() {
    const code = generateWidgetHTML();
    document.getElementById('generatedCode').innerText = code;
    const iframe = document.getElementById('previewIframe');
    const blob = new Blob([code], {type: 'text/html'});
    const url = URL.createObjectURL(blob);
    iframe.src = url;
    iframe.onload = () => URL.revokeObjectURL(url);
  }

  document.getElementById('copyCodeBtn').onclick = () => {
    navigator.clipboard.writeText(generateWidgetHTML()).then(() => alert('✅ 코드 복사됨'));
  };
  document.getElementById('downloadHtmlBtn').onclick = () => {
    const blob = new Blob([generateWidgetHTML()], {type: 'text/html'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'chat_widget.html';
    a.click();
    URL.revokeObjectURL(a.href);
  };

  function updateAll() { updateGeneratedCode(); }
  const inputs = ['chatRoomName', 'headerBg', 'chatBg', 'bubbleLeftColor', 'bubbleRightColor', 'textLeftColor', 'textRightColor', 'nameColor', 'btnBg', 'emptyBgUrl', 'chatBgUrl'];
  inputs.forEach(id => document.getElementById(id).addEventListener('input', updateAll));
  renderStoriesForm();
  updateAll();
</script>
</body>
</html>
